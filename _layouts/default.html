<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>

    <span class="mobile btn-mobile-menu">        
      <div class="nav_container">
         <nav class="nav-menu-item" style = "float:right">
            <i class="nav-menu-item">
              <a href="/#blog" title="{{site.blog_button.description}}" class="blog-button">  {{site.blog_button.title}}
              </a>
            </i>
            {% for item in site.nav %}
                <i class="nav-menu-item">

                  <a href="{{item.url}}" title="{{item.description}}" class="btn-mobile-menu__icon">
                      {{item.title}}
                  </a>
                </i>
            {% endfor %}
          </nav>
      </div>
    </span>
    
    {% include side-panel.html %}

    <div class="content-wrapper">
        <div class="content-wrapper__inner">
            {{ content }}
            {% include footer.html %}
        </div>
    </div>
    
    {% include external.html %}
    
    <script>
        let this_host = window.location.host;
        let imgs = document.getElementsByTagName('img');
        let hostUrl='',thisUrl='',thisAlt = '';
        for (let i = 0;i < imgs.length ;i++){
            hostUrl = 'https://'+this_host+'/images/';
            thisAlt  = imgs[i].getAttribute('alt');
            thisUrl = imgs[i].getAttribute('src');
            if(thisAlt == "blog_image"){
                imgs[i].setAttribute('src',hostUrl + thisUrl)
                console.log(hostUrl + thisUrl)
            }
        }
	</script>
  </body>

</html>
